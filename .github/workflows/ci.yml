name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          fmt_out="$(gofmt -l *.go)"
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            echo "gofmt check failed; run 'gofmt -w' on the above files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
